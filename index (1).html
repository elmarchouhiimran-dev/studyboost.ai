<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBoost AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6366f1;--secondary:#8b5cf6;--success:#10b981;
  --warning:#f59e0b;--danger:#ef4444;--dark:#1f2937;
  --light:#f9fafb;--border:#e5e7eb;--text:#374151;--muted:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:var(--text)}
.hidden{display:none!important}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.logo-icon-big{width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:12px}
.login-title{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.login-sub{color:var(--muted);font-size:14px}
.warn-box{background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;margin-bottom:6px;font-weight:600;font-size:14px;color:var(--dark)}
.field input,.field select{width:100%;padding:11px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary)}
.err-box{background:#fee2e2;color:var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.lang-row{text-align:right;margin-bottom:14px}
.lang-sel{padding:7px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
#app-screen{max-width:1400px;margin:0 auto;padding:20px}
.header{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,.1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.logo-row{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-name{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:13px;color:var(--muted)}
.user-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nav-bar{background:var(--light);border-radius:12px;padding:8px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.nav-btn{padding:10px 20px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:all .2s}
.nav-btn:hover{background:#fff}
.nav-btn.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 6px rgba(0,0,0,.08);margin-bottom:20px}
.card h2{font-size:19px;margin-bottom:16px;color:var(--dark)}
.card h3{font-size:16px;margin-bottom:12px;color:var(--dark)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.4)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-ghost{background:var(--light);color:var(--text)}
.btn-ghost:hover{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:18px;border-radius:12px;text-align:center}
.stat-val{font-size:30px;font-weight:700;margin-bottom:4px}
.stat-lbl{font-size:13px;opacity:.9}
.prog-bar{height:12px;background:var(--light);border-radius:6px;overflow:hidden;margin:12px 0}
.prog-fill{height:100%;background:linear-gradient(135deg,var(--primary),var(--secondary));transition:width .4s}
.timer-big{font-size:72px;font-weight:700;text-align:center;margin:20px 0;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.timer-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.task-form{margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.task-form input,.task-form select{padding:10px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.task-form input:focus,.task-form select:focus{outline:none;border-color:var(--primary)}
.task-form-btn{grid-column:1/-1}
.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{padding:14px;background:var(--light);border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.task-name{font-weight:600;font-size:15px;color:var(--dark)}
.task-meta{font-size:13px;color:var(--muted)}
.task-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-high{background:#fee2e2;color:var(--danger)}
.badge-medium{background:#fef3c7;color:var(--warning)}
.badge-low{background:#dbeafe;color:#3b82f6}
.fc-wrap{perspective:1000px;height:260px;cursor:pointer;margin:20px 0}
.fc-inner{width:100%;height:100%;position:relative;transition:transform .55s;transform-style:preserve-3d}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px;padding:24px;font-size:18px;text-align:center;flex-direction:column;gap:8px}
.fc-label{font-size:12px;opacity:.75;text-transform:uppercase;letter-spacing:.05em}
.fc-front{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.fc-back{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;transform:rotateY(180deg)}
.fc-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.q-option{padding:14px;border:2px solid var(--border);border-radius:8px;margin-bottom:10px;cursor:pointer;transition:all .2s;font-size:15px}
.q-option:hover{border-color:var(--primary);background:var(--light)}
.q-option.sel{border-color:var(--primary);background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.q-option.correct{border-color:var(--success);background:var(--success);color:#fff}
.q-option.wrong{border-color:var(--danger);background:var(--danger);color:#fff}
.gemini-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#4285f4;background:#e8f0fe;padding:3px 9px;border-radius:20px}
.chat-box{max-height:380px;overflow-y:auto;padding:14px;background:var(--light);border-radius:10px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.msg{padding:11px 15px;border-radius:12px;max-width:85%;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;margin-left:auto;border-bottom-right-radius:3px}
.msg.ai{background:#fff;border:2px solid var(--border);border-bottom-left-radius:3px}
.msg.loading{background:#fff;border:2px solid var(--border);color:var(--muted);font-style:italic}
.msg img{max-width:100%;border-radius:8px;margin-top:8px;display:block}
.chat-input-row{display:flex;gap:10px}
.chat-input{flex:1;padding:11px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.chat-input:focus{outline:none;border-color:var(--primary)}
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.upload-zone:hover,.upload-zone.over{border-color:var(--primary);background:var(--light)}
.upload-zone .uz-icon{font-size:28px;margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--muted)}
.upload-preview{max-height:110px;border-radius:8px}
@media(max-width:600px){
  .task-form{grid-template-columns:1fr}
  .timer-big{font-size:52px}
  .header{flex-direction:column}
}
</style>
</head>

var lang = localStorage.getItem('sb_lang') || 'en';
var currentUser = localStorage.getItem('sb_user') || null;
var isSignup = false;
var activeTab = 0;
var timerMin = 25, timerSec = 0, timerRunning = false, timerInterval = null;
var chatMsgs = [];
var chatLoading = false;
var pendingImg = null;
var fcIdx = 0, fcFlipped = false;
var quizIdx = 0, quizScore = 0, quizSel = null, quizAnswered = false, quizDone = false;

function t(k){ return T[lang][k] || k; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function pad(n){ return String(n).padStart(2,'0'); }

function save(key,val){ localStorage.setItem('sb_'+currentUser+'_'+key, typeof val==='object'?JSON.stringify(val):String(val)); }
function load(key,def){
  var v=localStorage.getItem('sb_'+currentUser+'_'+key);
  if(v===null) return def;
  try{ return JSON.parse(v); }catch(e){ return v; }
}

function setLang(l){
  lang=l;
  localStorage.setItem('sb_lang',l);
  document.getElementById('login-lang').value=l;
  var al=document.getElementById('app-lang');
  if(al) al.value=l;
  refreshLogin();
  if(currentUser) refreshApp();
}

function refreshLogin(){
  document.getElementById('l-tagline').textContent=t('tag');
  document.getElementById('l-warn').textContent=t('warn');
  document.getElementById('l-uname').textContent=t('ul');
  document.getElementById('l-pwd').textContent=t('pw');
  document.getElementById('inp-user').placeholder=t('ul');
  document.getElementById('inp-pwd').placeholder=t('pw');
  document.getElementById('btn-login').textContent=isSignup?t('signup'):t('login');
  document.getElementById('btn-toggle').textContent=isSignup?t('hasAcc'):t('noAcc');
}

function refreshApp(){
  document.getElementById('a-tagline').textContent=t('tag');
  document.getElementById('welcome-msg').innerHTML=t('wel')+', <strong>'+currentUser+'</strong>';
  document.getElementById('btn-logout').textContent=t('out');
  document.getElementById('app-lang').value=lang;
  renderNav();
  renderTab();
}

function toggleMode(){
  isSignup=!isSignup;
  document.getElementById('btn-login').textContent=isSignup?t('signup'):t('login');
  document.getElementById('btn-toggle').textContent=isSignup?t('hasAcc'):t('noAcc');
  document.getElementById('login-err').classList.add('hidden');
}

function showErr(msg){
  var el=document.getElementById('login-err');
  el.textContent=msg; el.classList.toggle('hidden',!msg);
}

function doLogin(){
  var user=document.getElementById('inp-user').value.trim();
  var pwd=document.getElementById('inp-pwd').value;
  if(!user||!pwd){ showErr(t('fa')); return; }
  var users=JSON.parse(localStorage.getItem('sb_users')||'{}');
  if(isSignup){
    if(users[user]){ showErr(t('ue')); return; }
    users[user]=pwd; localStorage.setItem('sb_users',JSON.stringify(users));
  } else {
    if(users[user]!==pwd){ showErr(t('bc')); return; }
  }
  localStorage.setItem('sb_user',user);
  currentUser=user;
  chatMsgs=[{role:'ai',text:t('gr')}];
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  refreshApp();
}

function doLogout(){
  localStorage.removeItem('sb_user');
  currentUser=null;
  timerRunning=false; clearInterval(timerInterval);
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('inp-user').value='';
  document.getElementById('inp-pwd').value='';
  refreshLogin();
}

function renderNav(){
  var nb=document.getElementById('nav-bar');
  nb.innerHTML=t('tabs').map(function(label,i){
    return '<button class="nav-btn'+(activeTab===i?' active':'')+'" onclick="switchTab('+i+')">'+label+'</button>';
  }).join('');
}

function switchTab(i){
  activeTab=i;
  if(i===4){ quizIdx=0;quizScore=0;quizSel=null;quizAnswered=false;quizDone=false; }
  renderNav(); renderTab();
}

function renderTab(){
  var el=document.getElementById('tab-content');
  switch(activeTab){
    case 0: el.innerHTML=renderDashboard(); break;
    case 1: el.innerHTML=renderTimer(); break;
    case 2: el.innerHTML=renderTasks(); break;
    case 3: el.innerHTML=renderFlashcards(); break;
    case 4: el.innerHTML=renderQuiz(); break;
    case 5: el.innerHTML=renderAI(); bindAI(); break;
  }
}

/* DASHBOARD */
function renderDashboard(){
  var mins=parseInt(load('studyTime',0));
  var tasks=parseInt(load('tasksCompleted',0));
  var goal=120, pct=Math.min(Math.round(mins/goal*100),100);
  return '<div class="stats-grid">'+
    '<div class="stat-card"><div class="stat-val">'+mins+'</div><div class="stat-lbl">'+t('ms')+'</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+tasks+'</div><div class="stat-lbl">'+t('td')+'</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+pct+'%</div><div class="stat-lbl">'+t('dg')+'</div></div>'+
    '</div><div class="card"><h2>'+t('dp')+'</h2>'+
    '<p>'+t('gl')+': '+goal+' '+t('ms').toLowerCase()+'</p>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<p style="color:var(--muted);font-size:14px">'+(mins>=goal?t('gc'):(goal-mins)+' '+t('mr'))+'</p></div>';
}

/* TIMER */
function renderTimer(){
  var sess=parseInt(load('sessions',0));
  return '<div class="card"><h2>'+t('tabs')[1]+' (Pomodoro)</h2>'+
    '<p style="color:var(--muted);margin-bottom:12px">'+t('st')+': <span id="sess-cnt">'+sess+'</span></p>'+
    '<div class="timer-big" id="tmr">'+pad(timerMin)+':'+pad(timerSec)+'</div>'+
    '<div class="timer-btns">'+
    '<button class="btn '+(timerRunning?'btn-danger':'btn-primary')+'" id="tmr-btn" onclick="toggleTimer()">'+
    (timerRunning?t('pa'):t('go'))+'</button>'+
    '<button class="btn btn-ghost" onclick="resetTimer()">'+t('re')+'</button></div></div>';
}

function toggleTimer(){
  timerRunning=!timerRunning;
  if(timerRunning){ timerInterval=setInterval(tickTimer,1000); }
  else { clearInterval(timerInterval); }
  var btn=document.getElementById('tmr-btn');
  if(btn){ btn.textContent=timerRunning?t('pa'):t('go'); btn.className='btn '+(timerRunning?'btn-danger':'btn-primary'); }
}

function tickTimer(){
  if(timerSec>0){ timerSec--; }
  else if(timerMin>0){ timerMin--; timerSec=59; }
  else {
    clearInterval(timerInterval); timerRunning=false;
    var s=parseInt(load('sessions',0))+1; save('sessions',s);
    var st=parseInt(load('studyTime',0))+25; save('studyTime',st);
    timerMin=25; timerSec=0;
    alert('Pomodoro complete! Take a break. ☕');
    renderTab(); return;
  }
  var d=document.getElementById('tmr');
  if(d) d.textContent=pad(timerMin)+':'+pad(timerSec);
}

function resetTimer(){
  clearInterval(timerInterval); timerRunning=false;
  timerMin=25; timerSec=0; renderTab();
}

/* TASKS */
function renderTasks(){
  var tasks=load('tasks',[]);
  var items=tasks.map(function(task,i){
    return '<div class="task-item" style="opacity:'+(task.done?'.6':'1')+'">'+
      '<div><div class="task-name" style="text-decoration:'+(task.done?'line-through':'none')+'">'+esc(task.title)+'</div>'+
      '<div class="task-meta">'+esc(task.subject)+'</div></div>'+
      '<div class="task-right"><span class="badge badge-'+task.priority+'">'+t(task.priority=='low'?'lo':task.priority=='high'?'hi':'me')+'</span>'+
      '<button class="btn btn-sm '+(task.done?'btn-ghost':'btn-success')+'" onclick="toggleTask('+i+')">'+
      (task.done?t('un'):t('dn'))+'</button>'+
      '<button class="btn btn-sm btn-danger" onclick="deleteTask('+i+')">'+t('dl')+'</button></div></div>';
  }).join('');
  return '<div class="card"><h2>'+t('tsk')+'</h2>'+
    '<div class="task-form">'+
    '<input id="nt" type="text" placeholder="'+t('tt')+'"/>'+
    '<input id="ns" type="text" placeholder="'+t('sub')+'"/>'+
    '<select id="np"><option value="low">'+t('lo')+'</option><option value="medium" selected>'+t('me')+'</option><option value="high">'+t('hi')+'</option></select>'+
    '<button class="btn btn-primary task-form-btn" onclick="addTask()">'+t('at')+'</button></div>'+
    '<div class="task-list">'+(items||'<p style="color:var(--muted);font-size:14px">No tasks yet.</p>')+'</div></div>';
}

function addTask(){
  var title=document.getElementById('nt').value.trim();
  var subj=document.getElementById('ns').value.trim();
  var prio=document.getElementById('np').value;
  if(!title||!subj) return;
  var tasks=load('tasks',[]); tasks.push({title:title,subject:subj,priority:prio,done:false});
  save('tasks',tasks); renderTab();
}

function toggleTask(i){
  var tasks=load('tasks',[]);
  tasks[i].done=!tasks[i].done;
  var cnt=parseInt(load('tasksCompleted',0));
  save('tasksCompleted',tasks[i].done?cnt+1:Math.max(0,cnt-1));
  save('tasks',tasks); renderTab();
}

function deleteTask(i){
  var tasks=load('tasks',[]); tasks.splice(i,1);
  save('tasks',tasks); renderTab();
}

/* FLASHCARDS */
function renderFlashcards(){
  var cards=load('flashcards',[]);
  var viewer='<p style="color:var(--muted);margin-bottom:16px">No flashcards yet. Create one below!</p>';
  if(cards.length){
    if(fcIdx>=cards.length) fcIdx=0;
    var c=cards[fcIdx];
    viewer='<p style="color:var(--muted);font-size:13px;margin-bottom:6px">'+(fcIdx+1)+' / '+cards.length+'</p>'+
      '<div class="fc-wrap" onclick="flipCard()">'+
      '<div class="fc-inner'+(fcFlipped?' flipped':'')+'" id="fc-inner">'+
      '<div class="fc-face fc-front"><span class="fc-label">'+t('q')+'</span><span>'+esc(c.question)+'</span></div>'+
      '<div class="fc-face fc-back"><span class="fc-label">'+t('a')+'</span><span>'+esc(c.answer)+'</span></div>'+
      '</div></div>'+
      '<div class="fc-controls">'+
      '<button class="btn btn-ghost" onclick="prevCard()">'+t('pr')+'</button>'+
      '<button class="btn btn-primary" onclick="flipCard()">'+t('fl')+'</button>'+
      '<button class="btn btn-ghost" onclick="nextCard()">'+t('nx')+'</button></div>';
  }
  return '<div class="card"><h2>'+t('fc')+'</h2>'+viewer+'</div>'+
    '<div class="card"><h3>'+t('nc')+'</h3>'+
    '<div class="field"><label>'+t('q')+'</label><input id="fc-q" type="text" placeholder="'+t('qe')+'"/></div>'+
    '<div class="field"><label>'+t('a')+'</label><textarea id="fc-a" rows="3" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px" placeholder="'+t('ae')+'"></textarea></div>'+
    '<button class="btn btn-primary" onclick="addCard()">'+t('ac')+'</button></div>';
}

function flipCard(){ fcFlipped=!fcFlipped; var el=document.getElementById('fc-inner'); if(el) el.className='fc-inner'+(fcFlipped?' flipped':''); }
function nextCard(){ var c=load('flashcards',[]); if(!c.length)return; fcFlipped=false; fcIdx=(fcIdx+1)%c.length; renderTab(); }
function prevCard(){ var c=load('flashcards',[]); if(!c.length)return; fcFlipped=false; fcIdx=(fcIdx-1+c.length)%c.length; renderTab(); }
function addCard(){
  var q=document.getElementById('fc-q').value.trim();
  var a=document.getElementById('fc-a').value.trim();
  if(!q||!a) return;
  var cards=load('flashcards',[]); cards.push({question:q,answer:a});
  save('flashcards',cards); fcIdx=cards.length-1; fcFlipped=false; renderTab();
}

/* QUIZ */
function getQs(){
  return [
    {q:t('q1'),opts:['H₂O','CO₂','O₂','H₂O₂'],ans:0},
    {q:t('q2'),opts:['Michelangelo','Leonardo da Vinci','Raphael','Donatello'],ans:1},
    {q:t('q3'),opts:['Earth','Mars','Jupiter','Saturn'],ans:2}
  ];
}

function renderQuiz(){
  var qs=getQs();
  if(quizDone) return '<div class="card" style="text-align:center">'+
    '<div style="font-size:52px;margin-bottom:12px">🎉</div>'+
    '<h2>'+t('qc')+'</h2>'+
    '<div style="font-size:52px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:14px 0">'+quizScore+'/'+qs.length+'</div>'+
    '<button class="btn btn-primary" onclick="restartQuiz()">'+t('rs')+'</button></div>';
  var q=qs[quizIdx];
  var opts=q.opts.map(function(o,i){
    var cls='q-option';
    if(quizAnswered){ if(i===q.ans) cls+=' correct'; else if(i===quizSel) cls+=' wrong'; }
    else if(i===quizSel) cls+=' sel';
    return '<div class="'+cls+'" onclick="selectOpt('+i+')">'+o+'</div>';
  }).join('');
  var actionBtn=!quizAnswered
    ?'<button class="btn btn-primary" onclick="submitQuiz()"'+(quizSel===null?' disabled':'')+'>'+t('sb')+'</button>'
    :'<button class="btn btn-primary" onclick="nextQuiz()">'+(quizIdx<qs.length-1?t('nq'):t('fq'))+'</button>';
  return '<div class="card"><h2>'+t('qz')+'</h2>'+
    '<p style="color:var(--muted);margin-bottom:20px">'+t('q')+' '+(quizIdx+1)+'/'+qs.length+' | '+t('sc')+': '+quizScore+'</p>'+
    '<h3 style="margin-bottom:20px">'+esc(q.q)+'</h3>'+opts+
    '<div style="margin-top:16px">'+actionBtn+'</div></div>';
}

function selectOpt(i){ if(quizAnswered)return; quizSel=i; renderTab(); }
function submitQuiz(){ if(quizSel===null)return; quizAnswered=true; if(quizSel===getQs()[quizIdx].ans) quizScore++; renderTab(); }
function nextQuiz(){ if(quizIdx<getQs().length-1){ quizIdx++;quizSel=null;quizAnswered=false;renderTab(); }else{ quizDone=true;renderTab(); } }
function restartQuiz(){ quizIdx=0;quizScore=0;quizSel=null;quizAnswered=false;quizDone=false;renderTab(); }

/* AI */
function renderAI(){
  var msgs=chatMsgs.map(function(m){
    var img=m.img?'<img src="'+m.img+'" alt="uploaded"/>':'';
    return '<div class="msg '+m.role+'">'+esc(m.text)+img+'</div>';
  }).join('');
  var loading=chatLoading?'<div class="msg loading">✨ '+t('an')+'</div>':'';
  var preview=pendingImg
    ?'<img class="upload-preview" src="'+pendingImg.preview+'" alt="preview"/>'
    :'<div class="uz-icon">📸</div><p>'+t('dr')+'</p>';
  return '<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
    '<h2 style="margin:0">'+t('ai')+'</h2>'+
    '<span class="gemini-badge">✨ '+t('pb')+'</span></div>'+
    '<div class="upload-zone" id="uz">'+preview+'</div>'+
    '<input type="file" id="fi" accept="image/*" style="display:none"/>'+
    '<div class="chat-box" id="chat-box">'+msgs+loading+'</div>'+
    '<div class="chat-input-row">'+
    '<input class="chat-input" id="chat-inp" type="text" placeholder="'+t('ph')+'"/>'+
    '<button class="btn btn-primary" id="send-btn" onclick="sendAI()">'+t('sd')+'</button>'+
    '</div></div>';
}

function bindAI(){
  var uz=document.getElementById('uz');
  var fi=document.getElementById('fi');
  if(!uz||!fi) return;
  uz.onclick=function(){ fi.click(); };
  uz.ondragover=function(e){ e.preventDefault(); uz.classList.add('over'); };
  uz.ondragleave=function(){ uz.classList.remove('over'); };
  uz.ondrop=function(e){ e.preventDefault(); uz.classList.remove('over'); handleFile(e.dataTransfer.files[0]); };
  fi.onchange=function(e){ handleFile(e.target.files[0]); };
  var ci=document.getElementById('chat-inp');
  if(ci) ci.onkeydown=function(e){ if(e.key==='Enter'&&!e.shiftKey) sendAI(); };
  var box=document.getElementById('chat-box');
  if(box) box.scrollTop=box.scrollHeight;
}

function handleFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  var reader=new FileReader();
  reader.onload=function(e){
    pendingImg={base64:e.target.result.split(',')[1],mime:file.type,preview:e.target.result};
    document.getElementById('tab-content').innerHTML=renderAI(); bindAI();
  };
  reader.readAsDataURL(file);
}

function sendAI(){
  var inp=document.getElementById('chat-inp');
  var text=inp?inp.value.trim():'';
  if(!text&&!pendingImg) return;
  if(inp) inp.value='';
  var imgSnap=pendingImg; pendingImg=null;
  chatMsgs.push({role:'user',text:text||(t('up')),img:imgSnap?imgSnap.preview:null});
  chatLoading=true;
  document.getElementById('tab-content').innerHTML=renderAI(); bindAI();
  var parts=[];
  if(imgSnap) parts.push({inline_data:{mime_type:imgSnap.mime,data:imgSnap.base64}});
  var prompt=text||'Describe this image and list key study concepts.';
  parts.push({text:'You are a helpful, concise study assistant. '+prompt});
  fetch(GEMINI_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    mode:'cors',
    body:JSON.stringify({contents:[{parts:parts}]})
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(e){ throw new Error((e.error&&e.error.message)||('HTTP '+r.status)); });
    return r.json();
  })
  .then(function(data){
    var reply='No response from Gemini.';
    try{ reply=data.candidates[0].content.parts[0].text; }catch(e){}
    if(data.error) reply='API Error: '+data.error.message;
    chatMsgs.push({role:'ai',text:reply});
  })
  .catch(function(err){
    var msg=err.message||'Unknown error';
    if(msg.indexOf('Failed to fetch')>-1||msg.indexOf('NetworkError')>-1){
      msg='Network error — if running from a local file, try hosting the page on a server (e.g. VS Code Live Server, or upload to GitHub Pages / Netlify).';
    }
    chatMsgs.push({role:'ai',text:'❌ '+msg});
  })
  .finally(function(){
    chatLoading=false;
    document.getElementById('tab-content').innerHTML=renderAI(); bindAI();
    var box=document.getElementById('chat-box');
    if(box) box.scrollTop=box.scrollHeight;
  });
}
